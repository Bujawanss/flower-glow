<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>everything is fine</title>

<style>

:root{
    --color-bg: linear-gradient(to top, #010329, #000005);
    --color-glass: linear-gradient(to left, #142544, #1a9092);
    --color-water: linear-gradient(to left,  #142544, #1b6d6e);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:var(--color-bg);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

/* TEXT */

/* TEXT */

h1{
    position:relative;
    z-index:1000;

    font-size:90px;
    font-weight:bold;
    text-align:center;

    max-width:1100px;
    line-height:1.2;

    /* gradient shine */
    background: linear-gradient(
        90deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.3) 35%,
        rgba(255,255,255,1) 50%,
        rgba(255,255,255,0.3) 65%,
        rgba(255,255,255,0.05) 100%
    );

    background-size:300% auto;

    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;

    /* glow lembut */
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));

    /* animasi */
    animation:shineText 15s linear infinite;
}

@keyframes shineText{

    0%{
        background-position:200% center;
    }

    100%{
        background-position:-200% center;
    }

}

/* BUTTON */

.buttons{
    margin-top:40px;
    display:flex;
    flex-direction:column;   /* vertikal */
    align-items:center;
    gap:15px;
    position:relative;
    z-index:1000;
}

button{
    padding:12px 28px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    background:var(--color-water);
}

#no{
    position:relative; /* awalnya ikut layout */
}

/* STAR SKY */

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
}

/* COMET */

.comet{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    transform:rotate(45deg);
}

.comet::after{
    content:"";
    position:absolute;
    width:150px;
    height:2px;
    top:1px;
    left:-150px;
    background:linear-gradient(to right, transparent, white);
}

@keyframes kometJatuh{
    from{
        transform:translate(-100px,-100px) rotate(45deg);
        opacity:1;
    }
    to{
        transform:translate(110vw,110vh) rotate(45deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<audio autoplay loop>
    <source src="laguniki.mp3" type="audio/mp3">
</audio>

<h1>Hi, Noya I have something for you</h1>

<div class="buttons">
<button onclick="lanjut()">Lanjut</button>
<button id="no">Tidak</button>
</div>

<script>

/* tombol kabur */

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseenter", kabur);

function kabur(){

    noBtn.style.position = "fixed";

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function lanjut(){
    window.location.href = "flower.html";
}

/* BINTANG DI LANGIT */

for(let i=0;i<120;i++){

    const star=document.createElement("div");
    star.classList.add("star");

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    const size=Math.random()*2+1;
    star.style.width=size+"px";
    star.style.height=size+"px";

    document.body.appendChild(star);
}

function buatKomet(){

    const comet=document.createElement("div");
    comet.classList.add("comet");

    /* posisi awal acak */

    comet.style.left = Math.random() * (window.innerWidth * 0.9) - 500 + "px";
    comet.style.top = Math.random() * 500 + "px";

    /* jarak gerak acak */

    const moveX = Math.random()*800 + 200;
    const moveY = Math.random()*800 + 200;

    comet.style.setProperty("--moveX", moveX+"px");
    comet.style.setProperty("--moveY", moveY+"px");

    /* durasi berbeda */

    const durasi=Math.random()*3+2;
    comet.style.animation=`kometJatuh ${durasi}s linear`;

    document.body.appendChild(comet);

    setTimeout(()=>{
        comet.remove();
    },durasi*1000);
}

/* lebih sering muncul */

function spawnMeteor(){

    buatKomet();

    const delay = Math.random()*1000 + 300;

    setTimeout(spawnMeteor, delay);
}

spawnMeteor();

</script>

</body>
</html>
